<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Offline</title>
    <style>
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        background: #f8fafc;
        color: #0f172a;
        display: grid;
        place-items: center;
        min-height: 100vh;
      }
      .card {
        width: min(90vw, 420px);
        background: white;
        border-radius: 24px;
        padding: 24px;
        box-shadow: 0 12px 40px rgba(15, 23, 42, 0.08);
      }
      h1 {
        margin-top: 0;
        font-size: 24px;
      }
      p {
        line-height: 1.5;
        color: #475569;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Нет сети</h1>
      <p>Приложение открыто в офлайн-режиме. Если основная страница уже была загружена раньше, попробуйте вернуться на неё ещё раз.</p>
    </div>
  </body>
</html>
